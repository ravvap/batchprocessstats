# Dummy values for @WebMvcTest slice — real beans are replaced by @MockBean.
# Without these, Spring Boot's OAuth2ResourceServerAutoConfiguration fails to
# bind the required issuer-uri property even when JwtDecoder is mocked.
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/test-tenant/v2.0
spring.security.oauth2.resourceserver.jwt.audiences=api://test-audience

# Suppress DataSource auto-config (no DB needed in WebMvcTest slice)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
